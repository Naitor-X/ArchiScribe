<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchiScribe - Projektdetail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 id="page-title">Projekt laden...</h1>
    </header>

    <main class="container">
        <a href="/app/" class="back-link">← Zurück zur Liste</a>

        <div id="message-container" style="display: none;"></div>

        <div id="project-status" style="margin-bottom: 1rem;"></div>

        <form id="project-form" class="form-card">
            <!-- Bauherr -->
            <div class="form-grid">
                <div class="form-group">
                    <label for="client_name">Bauherr</label>
                    <input type="text" id="client_name" name="client_name">
                </div>

                <div class="form-group">
                    <label for="address">Adresse</label>
                    <input type="text" id="address" name="address">
                </div>

                <div class="form-group">
                    <label for="phone">Telefon</label>
                    <input type="text" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email">
                </div>

                <!-- Grundstück -->
                <div class="form-group">
                    <label for="plot_location">Grundstücksstandort</label>
                    <input type="text" id="plot_location" name="plot_location">
                </div>

                <div class="form-group">
                    <label for="plot_size_m2">Grundstücksgröße (m²)</label>
                    <input type="number" id="plot_size_m2" name="plot_size_m2" step="0.01">
                </div>

                <div class="form-group">
                    <label for="landowner">Grundstückseigentümer</label>
                    <input type="text" id="landowner" name="landowner">
                </div>

                <div class="form-group">
                    <label for="topography">Topographie</label>
                    <select id="topography" name="topography"></select>
                </div>

                <div class="form-group">
                    <label for="topography_other">Topographie (Sonstiges)</label>
                    <input type="text" id="topography_other" name="topography_other">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="development_plan" name="development_plan"> Bebauungsplan vorhanden
                    </label>
                </div>

                <div class="form-group">
                    <label for="access_status">Erschließung</label>
                    <input type="text" id="access_status" name="access_status">
                </div>

                <!-- Projekt -->
                <div class="form-group">
                    <label for="project_type">Projektart</label>
                    <select id="project_type" name="project_type"></select>
                </div>

                <div class="form-group">
                    <label for="project_type_other">Projektart (Sonstiges)</label>
                    <input type="text" id="project_type_other" name="project_type_other">
                </div>

                <div class="form-group">
                    <label for="building_type">Gebäudetyp</label>
                    <select id="building_type" name="building_type"></select>
                </div>

                <div class="form-group">
                    <label for="building_type_other">Gebäudetyp (Sonstiges)</label>
                    <input type="text" id="building_type_other" name="building_type_other">
                </div>

                <div class="form-group">
                    <label for="construction_method">Bauweise</label>
                    <select id="construction_method" name="construction_method"></select>
                </div>

                <div class="form-group"></div>

                <!-- Technik -->
                <div class="form-group">
                    <label for="heating_type">Heizungstyp</label>
                    <select id="heating_type" name="heating_type"></select>
                </div>

                <div class="form-group">
                    <label for="heating_type_other">Heizungstyp (Sonstiges)</label>
                    <input type="text" id="heating_type_other" name="heating_type_other">
                </div>

                <!-- Finanzen -->
                <div class="form-group">
                    <label for="budget">Budget (€)</label>
                    <input type="number" id="budget" name="budget" step="0.01">
                </div>

                <div class="form-group">
                    <label for="planned_start">Geplanter Baubeginn</label>
                    <input type="text" id="planned_start" name="planned_start">
                </div>

                <div class="form-group">
                    <label for="own_contribution">Eigenleistung</label>
                    <select id="own_contribution" name="own_contribution">
                        <option value="">Bitte wählen</option>
                        <option value="ja">Ja</option>
                        <option value="nein">Nein</option>
                        <option value="teilweise">Teilweise</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="own_contribution_details">Eigenleistung Details</label>
                    <input type="text" id="own_contribution_details" name="own_contribution_details">
                </div>

                <!-- Sonstiges -->
                <div class="form-group">
                    <label for="accessibility">Barrierefreiheit</label>
                    <select id="accessibility" name="accessibility">
                        <option value="">Bitte wählen</option>
                        <option value="wichtig">Wichtig</option>
                        <option value="optional">Optional</option>
                        <option value="nicht relevant">Nicht relevant</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="outdoor_area">Außenanlage</label>
                    <input type="text" id="outdoor_area" name="outdoor_area">
                </div>

                <div class="form-group">
                    <label for="materiality">Materialität</label>
                    <input type="text" id="materiality" name="materiality">
                </div>

                <div class="form-group"></div>

                <div class="form-group full-width">
                    <label for="notes">Notizen</label>
                    <textarea id="notes" name="notes" rows="3"></textarea>
                </div>
            </div>

            <div class="button-bar">
                <button type="button" id="save-btn" class="btn btn-primary">Speichern</button>
                <button type="button" id="verify-btn" class="btn btn-success">Als verifiziert markieren</button>
                <a href="/app/" class="btn btn-secondary">Abbrechen</a>
            </div>
        </form>

        <!-- Raumprogramm -->
        <div class="section">
            <h2>Raumprogramm</h2>
            <div id="rooms-container" class="form-card">
                <p class="loading">Lade Räume...</p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>
